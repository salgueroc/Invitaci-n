<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación de Boda</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
background:linear-gradient(#fffdf9,#f6efe5);
font-family:'Cormorant Garamond',serif;
overflow-x:hidden;
}

.container{
max-width:500px;
margin:auto;
padding:30px;
text-align:center;
}

h1{
font-family:'Great Vibes',cursive;
font-size:65px;
color:#9b7b3f;
margin-bottom:10px;
animation:fadeIn 2s;
}

h2{
font-size:32px;
margin:0;
color:#4f4f4f;
}

p{
font-size:22px;
color:#555;
}

.card{
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 15px 35px rgba(0,0,0,.15);
position:relative;
animation:subir 1.5s;
}

.fecha{
font-size:28px;
margin-top:20px;
}

.lugar{
font-size:24px;
}

.btn{
display:block;
margin:20px auto;
padding:18px;
width:85%;
border-radius:50px;
text-decoration:none;
font-size:24px;
font-weight:bold;
transition:.4s;
}

.si{
background:#88a97c;
color:white;
}

.no{
background:#d8b0aa;
color:white;
}

.btn:hover{
transform:scale(1.05);
}

.corazon{
position:fixed;
font-size:25px;
animation:caer 8s linear infinite;
opacity:.5;
}

@keyframes caer{

0%{
transform:translateY(-100px);
}

100%{
transform:translateY(120vh);
}

}

@keyframes subir{
from{
opacity:0;
transform:translateY(50px);
}

to{
opacity:1;
transform:translateY(0);
}
}

@keyframes fadeIn{
from{
opacity:0;
}

to{
opacity:1;
}
}

.footer{
margin-top:30px;
font-size:20px;
}

</style>

</head>

<body>

<div class="corazon" style="left:10%;">🤍</div>
<div class="corazon" style="left:35%;animation-delay:2s;">🌸</div>
<div class="corazon" style="left:60%;animation-delay:4s;">🤍</div>
<div class="corazon" style="left:85%;animation-delay:1s;">🌿</div>

<div class="container">

<div class="card">

<p>Con mucha alegría te invitamos a nuestra</p>

<h1>Boda</h1>

<h2>[Nombre] & [Nombre]</h2>

<p>
Nos encantará compartir contigo uno de los días más importantes de nuestras vidas.
</p>

<div class="fecha">
📅 [Fecha]
</div>

<div class="fecha">
🕔 [Hora]
</div>

<div class="lugar">
📍 [Lugar]
</div>

<br>

<a class="btn si"
href="https://wa.me/57TU_NUMERO?text=Hola,%20confirmo%20que%20SÍ%20asistiré%20a%20la%20boda.%20¡Nos%20vemos!">
💚 Sí, asistiré
</a>

<a class="btn no"
href="https://wa.me/57TU_NUMERO?text=Hola,%20lamentablemente%20NO%20podré%20asistir%20a%20la%20boda.">
🤍 No podré asistir
</a>

<div class="footer">

Esperamos contar con tu presencia ❤️

</div>

</div>

</div>

</body>
</html>
